version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - bodyclose
    - noctx
    - gosec
    - contextcheck
  settings:
    govet:
      enable:
        - copylocks
        - shadow
    gocritic:
      enabled-checks:
        - sloppyReassign
        - unnamedResult
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - noctx
          - errcheck
          - gosec
          - contextcheck
          - bodyclose
