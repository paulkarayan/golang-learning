name: "dj-broadcast: CI"

on:
  push:
    branches: [main]
    paths:
      - 'dj-broadcast/**'
  pull_request:
    branches: [main]
    paths:
      - 'dj-broadcast/**'

defaults:
  run:
    working-directory: dj-broadcast

jobs:
  static:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: dj-broadcast/go.mod
          cache-dependency-path: dj-broadcast/go.sum

      - name: gofmt check
        run: test -z "$(gofmt -l .)" || (echo "Files not formatted:"; gofmt -l .; exit 1)

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          install-mode: goinstall
          working-directory: dj-broadcast

      - name: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            dj-broadcast/.semgrep.yml
            p/golang
            p/trailofbits

  gcatch:
    name: GCatch Concurrency Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: dj-broadcast/go.mod
          cache-dependency-path: dj-broadcast/go.sum

      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev z3

      - name: Install GCatch
        run: |
          export GOPATH=$HOME/go
          mkdir -p $GOPATH/src/github.com/system-pclub
          git clone https://github.com/system-pclub/GCatch.git $GOPATH/src/github.com/system-pclub/GCatch
          # fetch GOPATH-mode dependencies GCatch needs
          go get golang.org/x/xerrors
          go get golang.org/x/mod/semver
          go get golang.org/x/sys/execabs
          # copy them into GOPATH/src for GO111MODULE=off
          cp -r $(go env GOMODCACHE)/golang.org/x/xerrors@*/. $GOPATH/src/golang.org/x/xerrors/ 2>/dev/null || true
          cp -r $(go env GOMODCACHE)/golang.org/x/mod@*/. $GOPATH/src/golang.org/x/mod/ 2>/dev/null || true
          cp -r $(go env GOMODCACHE)/golang.org/x/sys@*/. $GOPATH/src/golang.org/x/sys/ 2>/dev/null || true
          cp -r $(go env GOMODCACHE)/golang.org/x/tools@*/. $GOPATH/src/golang.org/x/tools/ 2>/dev/null || true
          cd $GOPATH/src/github.com/system-pclub/GCatch/GCatch/cmd/GCatch
          GO111MODULE=off go install
          echo "$GOPATH/bin" >> $GITHUB_PATH

      - name: Copy project into GOPATH
        run: |
          export GOPATH=$HOME/go
          mkdir -p $GOPATH/src/dj-broadcast
          cp -r . $GOPATH/src/dj-broadcast/

      - name: Run GCatch
        run: |
          export GOPATH=$HOME/go
          GO111MODULE=off $GOPATH/bin/GCatch \
            -path=$GOPATH/src/dj-broadcast \
            -include=dj-broadcast \
            -checker=BMOC \
            -r
        continue-on-error: true

  race:
    name: Race Detector
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: dj-broadcast/go.mod
          cache-dependency-path: dj-broadcast/go.sum

      - name: Tests with race detector
        run: go test -race -count=10 ./...
        env:
          GOMAXPROCS: 4
