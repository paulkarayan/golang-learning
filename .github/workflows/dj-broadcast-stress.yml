name: "dj-broadcast: Stress Tests"

on:
  schedule:
    - cron: '17 6,12,18,0 * * *' # 4x daily
  workflow_dispatch: # manual trigger

defaults:
  run:
    working-directory: dj-broadcast

jobs:
  stress:
    name: Stress + Race (count=100)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: dj-broadcast/go.mod
          cache-dependency-path: dj-broadcast/go.sum

      - name: Stress tests with race detector
        run: go test -tags=stress -race -count=100 -timeout=15m ./...
        env:
          GOMAXPROCS: 4
