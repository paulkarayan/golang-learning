rules:
  - id: fire-and-forget-goroutine
    patterns:
      - pattern: |
          go func() {
            ...
          }()
    paths:
      exclude:
        - "*_test.go"
    message: >
      Goroutine launched without error propagation or coordination.
      Consider using errgroup or passing errors via channel.
    languages: [go]
    severity: WARNING

  - id: channel-close-without-once
    patterns:
      - pattern: close($CHAN)
      - pattern-not-inside: |
          $ONCE.Do(func() {
            ...
          })
    paths:
      exclude:
        - "*_test.go"
    message: >
      Closing a channel outside sync.Once risks double-close panic.
      Wrap in sync.Once.Do() for safety.
    languages: [go]
    severity: WARNING

  - id: sleep-based-synchronization
    pattern: time.Sleep(...)
    paths:
      include:
        - "*_test.go"
      exclude:
        - "*_stress_test.go"
    message: >
      Using time.Sleep for synchronization in tests is flaky.
      Use channels, sync.WaitGroup, or condition variables instead.
    languages: [go]
    severity: WARNING

  - id: unbounded-append-in-loop
    patterns:
      - pattern: |
          for ... {
            ...
            $X = append($X, ...)
            ...
          }
      - pattern-not-inside: |
          if len($X) > $LIMIT {
            ...
          }
    paths:
      exclude:
        - "*_test.go"
    message: >
      Appending in a loop without bounds checking may cause unbounded memory growth.
    languages: [go]
    severity: INFO

  - id: defer-channel-send
    pattern: |
        defer func() {
          ...
          $CH <- $VAL
          ...
        }()
    paths:
      exclude:
        - "*_test.go"
    message: >
      Defer block sends on a channel. If the receiver is already gone
      when this defer runs, it will block forever (goroutine leak) or
      panic on a closed channel.
    languages: [go]
    severity: WARNING

  - id: wg-add-inside-goroutine
    pattern: |
        go func(...) {
          ...
          $WG.Add(...)
          ...
        }(...)
    paths:
      exclude:
        - "*_test.go"
    message: >
      wg.Add() called inside a goroutine creates a race with wg.Wait().
      Always call wg.Add() before launching the goroutine.
    languages: [go]
    severity: ERROR

  - id: closeable-type-inventory
    pattern-either:
      - pattern: |
          func ($R $TYPE) Close() { ... }
      - pattern: |
          func ($R $TYPE) Close() error { ... }
      - pattern: |
          func ($R $TYPE) Stop() { ... }
      - pattern: |
          func ($R $TYPE) Stop() error { ... }
      - pattern: |
          func ($R $TYPE) Shutdown() { ... }
      - pattern: |
          func ($R $TYPE) Shutdown(...) error { ... }
    paths:
      exclude:
        - "*_test.go"
    message: >
      Type has a Close/Stop/Shutdown method. LLM should verify all public
      methods handle the closed state safely.
    languages: [go]
    severity: INFO

  - id: channel-make-inventory
    pattern-either:
      - pattern: make(chan $T)
      - pattern: make(chan $T, $N)
    paths:
      exclude:
        - "*_test.go"
    message: >
      Channel creation site. LLM should verify producer/consumer lifecycle
      and check for deadlock or send-after-close.
    languages: [go]
    severity: INFO

  - id: mutex-lock-inventory
    pattern-either:
      - pattern: $MU.Lock()
      - pattern: $MU.RLock()
    paths:
      exclude:
        - "*_test.go"
    message: >
      Mutex lock site. If multiple locks exist on the same type, LLM should
      verify consistent acquisition ordering.
    languages: [go]
    severity: INFO
